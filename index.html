<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estranho Bot Control Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <!-- Header -->
  <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-10">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-400">Estranho Bot Control Panel</h1>
      <nav class="flex space-x-4">
        <a href="#" class="px-3 py-2 rounded-md bg-indigo-600 text-white" data-tab="dashboard">Dashboard</a>
        <a href="#" class="px-3 py-2 rounded-md hover:bg-gray-700 text-gray-300" data-tab="kanban">Kanban Board</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto p-4">
    <!-- Dashboard Tab -->
    <div id="dashboard" class="tab-content">
      <h2 class="text-xl font-bold mb-4">Real-Time Session Monitoring</h2>
      
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-gray-800 rounded-lg p-4 border-l-4 border-indigo-500">
          <p class="text-sm text-gray-400">Active Sessions</p>
          <p class="text-3xl font-bold" id="active-sessions">0</p>
        </div>
        <div class="bg-gray-800 rounded-lg p-4 border-l-4 border-green-500">
          <p class="text-sm text-gray-400">Total Tokens (24h)</p>
          <p class="text-3xl font-bold" id="total-tokens">0</p>
        </div>
        <div class="bg-gray-800 rounded-lg p-4 border-l-4 border-blue-500">
          <p class="text-sm text-gray-400">Total Cost (24h)</p>
          <p class="text-3xl font-bold" id="total-cost">$0.00</p>
        </div>
        <div class="bg-gray-800 rounded-lg p-4 border-l-4 border-yellow-500">
          <p class="text-sm text-gray-400">Last Update</p>
          <p class="text-xl font-bold" id="last-update">--:--</p>
        </div>
      </div>

      <!-- Session List -->
      <div class="bg-gray-800 rounded-lg p-4">
        <h3 class="text-lg font-semibold mb-3">Active Sessions</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead>
              <tr class="border-b border-gray-700">
                <th class="p-2">Session ID</th>
                <th class="p-2">Model</th>
                <th class="p-2">Type</th>
                <th class="text-right p-2">Context %</th>
                <th class="text-right p-2">Tokens</th>
                <th class="text-right p-2">Cost</th>
              </tr>
            </thead>
            <tbody id="session-list">
              <!-- Sessions will be populated here -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Model Breakdown -->
      <div class="mt-6 bg-gray-800 rounded-lg p-4">
        <h3 class="text-lg font-semibold mb-3">Token Usage by Model</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="model-breakdown">
          <!-- Model breakdown will be populated here -->
        </div>
      </div>
    </div>

    <!-- Kanban Board Tab -->
    <div id="kanban" class="tab-content hidden">
      <h2 class="text-xl font-bold mb-4">Kanban Board</h2>
      <button onclick="openAddModal()" class="mb-4 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded text-white">
        + Add New Task
      </button>
      <div id="kanbanBoard" class="flex gap-4 overflow-x-auto"></div>
    </div>
  </main>

  <!-- Task Modal -->
  <div id="taskModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-gray-800 rounded-lg p-6 w-full max-w-md">
      <h3 id="modalTitle" class="text-xl font-bold mb-4">Add New Task</h3>
      <input type="hidden" id="taskId">
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Title</label>
        <input type="text" id="taskTitle" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:border-indigo-500 outline-none">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Description</label>
        <textarea id="taskDescription" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:border-indigo-500 outline-none"></textarea>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Column</label>
        <select id="taskColumn" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:border-indigo-500 outline-none">
          <option value="backlog">Backlog</option>
          <option value="in-progress">In Progress</option>
          <option value="testing">Testing</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium mb-1">Priority</label>
        <select id="taskPriority" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:border-indigo-500 outline-none">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="flex justify-end space-x-2">
        <button onclick="closeModal()" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 rounded">Cancel</button>
        <button onclick="saveTask()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded text-white">Save Task</button>
      </div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
  <script src="js/kanban.js"></script>
</body>
</html>
